# Starship prompt — https://starship.rs/config/
# Synced via dotfiles; symlinked to ~/.config/starship.toml by install.sh.
# Requires a Nerd Font (already a check.sh prerequisite) for the glyphs.

# Two-line prompt: info line, then a clean prompt char you always type next to.
format = """
$directory\
$git_branch\
$git_status\
$kubernetes\
$nodejs$python$golang$rust$java\
$cmd_duration\
$line_break\
$character"""

# Per-command ceiling for module detection (node/kubectl/etc). Warm runs are
# ~20ms; a cold binary can spike past several hundred ms, so keep headroom to
# avoid spurious "command timed out" warnings.
command_timeout = 2000
add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
read_only = " "
read_only_style = "red"

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Kubernetes context — only renders when a context is set ("if any").
[kubernetes]
disabled = false
symbol = "⎈ "
style = "bold blue"
format = '[$symbol$context( \($namespace\))]($style) '

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[ $duration]($style) "

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
[python]
symbol = " "
format = '[$symbol($version )]($style)'
[golang]
symbol = " "
format = "[$symbol($version )]($style)"
[rust]
symbol = " "
format = "[$symbol($version )]($style)"
[java]
symbol = " "
format = "[$symbol($version )]($style)"
