# ── tmux ──────────────────────────────────────────────────────────────────
# Synced via dotfiles. Status-bar data comes from ~/.config/tmux/statusbar.sh
# (symlinked from tmux/statusbar.sh by install.sh). Reload: prefix + r.

set-option -g default-shell /bin/zsh

# ── General behaviour ──────────────────────────────────────────────────────
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc,xterm-kitty:Tc"  # truecolor
set -g  mouse on
set -g  history-limit 50000
set -s  escape-time 10          # snappier ESC (vim)
set -g  focus-events on
set -g  set-clipboard on
set -g  base-index 1            # windows start at 1
setw -g pane-base-index 1
set -g  renumber-windows on     # keep window numbers gapless
set -g  display-time 2000
setw -g mode-keys vi

# ── Key bindings (i3-flavoured, to match aerospace/i3) ──────────────────────
bind r source-file ~/.tmux.conf \; display "  config reloaded"
# Split keeping the current directory; mnemonic | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# resize with prefix + Shift-HJKL (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# vi copy: v to select, y to yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Theme (Catppuccin Mocha-ish dark palette) ───────────────────────────────
BG="#1e1e2e"; FG="#cdd6f4"; SURF="#313244"
BLUE="#89b4fa"; GREEN="#a6e3a1"; YELLOW="#f9e2af"; RED="#f38ba8"
MAUVE="#cba6f7"; PEACH="#fab387"; TEAL="#94e2d5"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=$BG,fg=$FG"
set -g message-style "bg=$SURF,fg=$FG"
set -g pane-border-style "fg=$SURF"
set -g pane-active-border-style "fg=$BLUE"

# Left: session name, plus a PREFIX flag when the prefix key is armed.
set -g status-left-length 40
set -g status-left "#[fg=$BG,bg=$BLUE,bold]  #S #[fg=$BLUE,bg=$BG]#{?client_prefix,#[fg=$RED] PREFIX,} "

# Windows: index:name, current one highlighted.
setw -g window-status-format         "#[fg=$FG] #I:#W "
setw -g window-status-current-format "#[fg=$BG,bg=$MAUVE,bold] #I:#W "
setw -g window-status-separator ""

# Right: battery │ cpu │ ram │ disk │ net │ ip │ dns │ date/time │ host.
# cpu = load/cores, ram & disk = used/total, net = ↓down ↑up throughput.
set -g status-right-length 350
set -g status-right "\
#[fg=$MAUVE]  #($HOME/.config/tmux/statusbar.sh battery) \
#[fg=$SURF]│#[fg=$RED] 󰓅 #($HOME/.config/tmux/statusbar.sh cpu) \
#[fg=$SURF]│#[fg=$GREEN] 󰍛 #($HOME/.config/tmux/statusbar.sh ram) \
#[fg=$SURF]│#[fg=$YELLOW] 󰋊 #($HOME/.config/tmux/statusbar.sh disk) \
#[fg=$SURF]│#[fg=$TEAL]  #($HOME/.config/tmux/statusbar.sh net) \
#[fg=$SURF]│#[fg=$BLUE] 󰩠 #($HOME/.config/tmux/statusbar.sh ip) \
#[fg=$SURF]│#[fg=$PEACH]  #($HOME/.config/tmux/statusbar.sh dns) \
#[fg=$SURF]│#[fg=$TEAL]  %a %d %b %H:%M \
#[fg=$BG,bg=$BLUE,bold]  #h "
